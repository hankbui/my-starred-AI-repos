mkdir -p .github/workflows
cat > .github/workflows/update-repos.yml << 'EOF'
name: Update AI Repos Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_data.py
          python scripts/generate_website.py
      - run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/ website/
          git commit -m "chore: update repos data" || true
          git push
EOF

git add .github/workflows/update-repos.yml
git commit -m "Add GitHub Actions workflow"
git push

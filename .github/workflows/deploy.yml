name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_run:
    # Deploy after the daily data refresh finishes (its commit uses [skip ci],
    # which push triggers honour but workflow_run does not).
    workflows: ["Update AI Repos Data"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

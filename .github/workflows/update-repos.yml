name: Update AI Repos Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate repo data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_data.py

      - name: Generate ideas data
        env:
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: idea-scraper/0.1
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python scripts/generate_ideas.py || echo "Ideas scraper completed (some sources may have been skipped)"

      - name: Generate AI landscape data (repos / devs / bots)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AILIST_CONTRIB_REPOS: '300'
        run: |
          python scripts/generate_ailist.py || echo "AI landscape generation skipped/partial"

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/ website/data/
          git commit -m "chore: update repos & ideas data [skip ci]" || echo "No changes to commit"
          git push
